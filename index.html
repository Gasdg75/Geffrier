<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {

    --card-h: 520px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Outfit', sans-serif;

  /* ── NAV ───────────────────────────────────────────── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 56px;
    mix-blend-mode: normal;
    transition: background .4s, padding .4s;
  }
  nav.scrolled {
    background: rgba(253,252,249,.92);
    backdrop-filter: blur(12px);
    padding: 18px 56px;
    box-shadow: 0 1px 0 rgba(0,0,0,.06);
  }
  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    letter-spacing: .35em;
    text-transform: uppercase;
    color: var(--white);
    text-decoration: none;
    transition: color .3s;
  }
  nav.scrolled .nav-logo { color: var(--ink); }
  .nav-links { display: flex; gap: 40px; list-style: none; }
  .nav-links a {
    font-size: .72rem;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: rgba(255,255,255,.8);
    text-decoration: none;
    transition: color .3s;
  }
  nav.scrolled .nav-links a { color: var(--mist); }
  .nav-links a:hover { color: var(--gold); }

  /* ── HERO ──────────────────────────────────────────── */
  .hero {
    height: 100vh;
    position: relative;
    display: flex; align-items: flex-end;
    padding: 0 56px 80px;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background: linear-gradient(
      160deg,
      #1a2a1e 0%,
      #2d3b2a 25%,
      #3a4a44 55%,
      #4a5a6a 80%,
      #2e3a48 100%
    );
  }
  /* Layered landscape silhouette */
  .hero-bg::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 60% 70%, rgba(74,90,106,.5) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 20% 80%, rgba(26,42,30,.8) 0%, transparent 60%);
  }
  .hero-bg::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 50%;
    background: linear-gradient(to top, rgba(14,14,12,.55), transparent);
  }
  .hero-eyebrow {
    font-size: .65rem;
    letter-spacing: .3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 18px;
  }
  .hero-content { position: relative; z-index: 2; max-width: 680px; }
  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 7vw, 5.5rem);
    font-weight: 300;
    line-height: 1.05;
    color: var(--white);
    margin-bottom: 28px;
  }
  .hero-title em { font-style: italic; color: rgba(255,255,255,.7); }
  .hero-sub {
    font-size: .85rem;
    letter-spacing: .08em;
    color: rgba(255,255,255,.6);
    line-height: 1.8;
    max-width: 420px;
    margin-bottom: 44px;
  }
  .btn-primary {
    display: inline-block;
    padding: 14px 40px;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-size: .7rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    text-decoration: none;
    transition: background .25s, color .25s;
  }
  .btn-primary:hover { background: var(--gold); color: var(--ink); }
  .scroll-hint {
    position: absolute; bottom: 40px; right: 56px; z-index: 2;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    font-size: .6rem; letter-spacing: .2em; text-transform: uppercase;
    color: rgba(255,255,255,.4);
  }
  .scroll-hint-line {
    width: 1px; height: 48px;
    background: linear-gradient(to bottom, var(--gold), transparent);
    animation: scrollLine 2s ease-in-out infinite;
  }
  @keyframes scrollLine { 0%,100%{transform:scaleY(1);opacity:1} 50%{transform:scaleY(.4);opacity:.4} }

  /* ── SECTION INTRO ──────────────────────────────────── */
  .intro {
    padding: 120px 56px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 80px;
    align-items: center;
    border-bottom: 1px solid rgba(0,0,0,.07);
  }
  .intro-label {
    font-size: .62rem; letter-spacing: .3em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 20px;
  }
  .intro-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 4vw, 3.2rem);
    font-weight: 300; line-height: 1.15;
    margin-bottom: 28px;
  }
  .intro-title em { font-style: italic; }
  .intro-body {
    font-size: .9rem; line-height: 1.9; color: #555; max-width: 440px;
  }
  .intro-stat {
    text-align: right;
  }
  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 7rem; font-weight: 300; line-height: 1;

  }
  .stat-label {
    font-size: .65rem; letter-spacing: .22em; text-transform: uppercase;
    color: var(--mist);
  }
